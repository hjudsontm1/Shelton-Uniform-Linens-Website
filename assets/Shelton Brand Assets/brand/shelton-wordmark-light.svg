  <text class="brand-name" x="30" y="100" fill="#081321" font-size="76" letter-spacing="10">SHELTON LINEN &amp; UNIFORM SERVICES</text>
  <text class="descriptor" x="34" y="178" fill="#B8965A" font-size="28" letter-spacing="7">COMMERCIAL LAUNDRY SERVICES · SAN DIEGO</text>
</svg>
